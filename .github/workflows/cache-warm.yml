name: Cache Warm
on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    continue-on-error: true
    strategy:
      fail-fast: false
      matrix:
        system:
          - { name: vaermina, platform: ubuntu-24.04, kind: nixos }
          - { name: Xaviers-MacBook-Pro, platform: macos-14, kind: darwin }

    runs-on: ${{ matrix.system.platform }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Make space
        if: startsWith(matrix.system.platform, 'ubuntu')
        uses: wimpysworld/nothing-but-nix@v10

      - name: Install Nix
        uses: DeterminateSystems/determinate-nix-action@v3.21.0

      - name: Tailscale
        uses: tailscale/github-action@v4
        with:
          oauth-client-id: ${{ secrets.TAILSCALE_OAUTH_CLIENT_ID }}
          oauth-secret: ${{ secrets.TAILSCALE_OAUTH_CLIENT_SECRET }}
          tags: tag:deploy-rs

      - name: Setup Attic cache
        uses: ryanccn/attic-action@v0
        with:
          endpoint: ${{ vars.ATTIC_ENDPOINT }}
          cache: ${{ vars.ATTIC_CACHE }}
          token: ${{ secrets.ATTIC_TOKEN }}

      - name: Build ${{ matrix.system.name }}
        if: matrix.system.kind == 'nixos'
        run: |
          nix run github:Mic92/nix-fast-build -- \
            --skip-cached \
            --no-nom \
            --flake ".#nixosConfigurations.${{ matrix.system.name }}.config.system.build.toplevel"

      - name: Build (darwin) ${{ matrix.system.name }}
        if: matrix.system.kind == 'darwin'
        run: |
          nix run github:Mic92/nix-fast-build -- \
            --skip-cached \
            --no-nom \
            --flake '.#darwinConfigurations."${{ matrix.system.name }}".system'
